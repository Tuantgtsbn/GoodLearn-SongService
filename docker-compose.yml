version: "3.9"

services:
  vocal-scoring-api:
    build: .
    container_name: vocal-scoring-api
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    environment:
      - ENVIRONMENT=production
      - MAX_FILE_SIZE_MB=50
      - MAX_AUDIO_DURATION=500
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
